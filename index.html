<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dean Winchester - Supernatural</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #000000, #1a1a1a);
    color:white;
    text-align:center;
}

header{
    background:#8B0000;
    padding:30px;
    box-shadow:0 0 20px red;
}

h1{
    font-size:3em;
}

p{
    margin:20px;
    line-height:1.6;
}

.galeria{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
    margin:30px;
}

.galeria img{
    width:300px;
    height:400px;
    object-fit:cover;
    border:3px solid #8B0000;
    border-radius:10px;
    transition:0.3s;
}

.galeria img:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px red;
}

.card{
    max-width:900px;
    margin:auto;
    padding:20px;
}

footer{
    background:#111;
    padding:20px;
    margin-top:40px;
}
</style>
</head>
<body>

<header>
    <h1>Dean Winchester</h1>
    <h2>Supernatural</h2>
</header>

<div class="card">
    <p>
        Dean Winchester é um dos protagonistas da série Supernatural.
        Caçador de criaturas sobrenaturais, conhecido por seu humor,
        coragem, amor por carros clássicos e dedicação à família.
    </p>
</div>

<section class="galeria">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/8e/Jensen_Ackles_2019.jpg/800px-Jensen_Ackles_2019.jpg" alt="Dean Winchester">

    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/f4/Jensen_Ackles_2013.jpg/800px-Jensen_Ackles_2013.jpg" alt="Dean Winchester">

    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/62/Jensen_Ackles.jpg/800px-Jensen_Ackles.jpg" alt="Dean Winchester">
</section>

<h2>O Famoso Impala 1967</h2>

<img
src="https://upload.wikimedia.org/wikipedia/commons/3/31/1967_Chevrolet_Impala.jpg"
width="700"
style="border-radius:10px; border:3px solid #8B0000;"
>

<br><br>

<h2>Trilha Sonora</h2>

<audio controls autoplay loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    Seu navegador não suporta áudio.
</audio>

<footer>
    <p>Site criado para fãs de Dean Winchester ❤️</p>
</footer>

</body>
</html>
